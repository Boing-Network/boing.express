<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Boing Wallet</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div id="app">
    <div class="header">
      <h1 class="logo">Boing Wallet</h1>
    </div>
    <div id="screen-choose" class="screen">
      <p class="tagline">The DeFi that always bounces back</p>
      <div class="actions">
        <button type="button" id="btn-create" class="btn-primary">Create wallet</button>
        <button type="button" id="btn-import" class="btn-secondary">Import wallet</button>
      </div>
    </div>
    <div id="screen-unlock" class="screen hidden">
      <p class="hint" id="unlock-hint"></p>
      <form id="form-unlock" class="form">
        <input type="password" id="unlock-password" placeholder="Password" class="input" />
        <p id="unlock-error" class="error hidden"></p>
        <button type="submit" class="btn-primary">Unlock</button>
      </form>
      <button type="button" id="btn-unlock-back" class="btn-text">Back</button>
    </div>
    <div id="screen-create" class="screen hidden">
      <p class="subtitle">Generate a new keypair. Back up your key.</p>
      <form id="form-create" class="form">
        <input type="password" id="create-password" placeholder="Password (min 8 chars)" class="input" />
        <input type="password" id="create-confirm" placeholder="Confirm password" class="input" />
        <p id="create-error" class="error hidden"></p>
        <button type="submit" class="btn-primary">Create wallet</button>
      </form>
      <button type="button" id="btn-create-back" class="btn-text">Back</button>
    </div>
    <div id="screen-import" class="screen hidden">
      <p class="subtitle">Enter 64-char hex private key.</p>
      <form id="form-import" class="form">
        <textarea id="import-key" placeholder="0x... or 64 hex chars" class="textarea" rows="3"></textarea>
        <input type="password" id="import-password" placeholder="Password (min 8 chars)" class="input" />
        <input type="password" id="import-confirm" placeholder="Confirm password" class="input" />
        <p id="import-error" class="error hidden"></p>
        <button type="submit" class="btn-primary">Import wallet</button>
      </form>
      <button type="button" id="btn-import-back" class="btn-text">Back</button>
    </div>
    <div id="screen-dashboard" class="screen hidden">
      <div class="row">
        <select id="network-select" class="select"></select>
        <button type="button" id="btn-lock" class="btn-small">Lock</button>
      </div>
      <section class="card">
        <h2 class="label">Address</h2>
        <div class="row">
          <code id="address" class="address"></code>
          <button type="button" id="btn-copy" class="btn-small">Copy</button>
        </div>
      </section>
      <section class="card">
        <h2 class="label">Balance</h2>
        <p class="balance"><span id="balance">…</span> <span id="symbol">BOING</span></p>
        <p id="balance-error" class="error hidden"></p>
      </section>
      <section class="card">
        <h2 class="label">Send</h2>
        <form id="form-send" class="form">
          <input type="text" id="send-to" placeholder="To (64 hex)" class="input" />
          <input type="text" id="send-amount" placeholder="Amount" class="input" />
          <p id="send-error" class="error hidden"></p>
          <p id="send-success" class="success hidden"></p>
          <button type="submit" class="btn-primary">Send</button>
        </form>
      </section>
      <section class="card">
        <h2 class="label">Faucet</h2>
        <button type="button" id="btn-faucet" class="btn-primary">Request testnet BOING</button>
        <button type="button" id="btn-faucet-page" class="btn-secondary">Open faucet page</button>
        <p id="faucet-error" class="error hidden"></p>
      </section>
    </div>
  </div>
  <script src="popup.js" type="module"></script>
</body>
</html>
