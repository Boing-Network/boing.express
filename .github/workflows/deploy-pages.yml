# Deploy Boing Wallet to Cloudflare Pages on push to main.
# Requires repo secrets: CLOUDFLARE_ACCOUNT_ID, CLOUDFLARE_API_TOKEN
#
# If deployments don't run on push:
# - Settings → Actions → General: ensure "Allow all actions" (or allow this workflow)
# - Ensure default branch is main and the push was to main
# - Check Actions tab for any run (success or failure); use "Run workflow" to trigger manually

name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          VITE_BOING_TESTNET_RPC: ${{ vars.VITE_BOING_TESTNET_RPC || 'https://testnet-rpc.boing.network' }}
          VITE_BOING_MAINNET_RPC: ${{ vars.VITE_BOING_MAINNET_RPC || 'https://rpc.boing.network' }}

      - name: Deploy to Cloudflare Pages
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::Missing secrets. Add CLOUDFLARE_ACCOUNT_ID and CLOUDFLARE_API_TOKEN in repo Settings → Secrets and variables → Actions."
            exit 1
          fi
          pnpm exec wrangler pages deploy dist --project-name=boing-wallet
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
