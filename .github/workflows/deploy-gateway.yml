# Deploy the Boing Express JSON-RPC gateway Worker (workers/rpc-gateway/).
# One-time: set Worker secrets in Cloudflare (or via wrangler secret put) for the target account:
#   BOING_UPSTREAM_RPC_URL  — full HTTPS URL of Boing JSON-RPC (see docs/RPC_GATEWAY.md)
#   GATEWAY_API_KEY        — optional shared secret for clients
#
# Uses the same Cloudflare credentials as Pages deploy (repo secrets).

name: Deploy RPC gateway Worker

on:
  push:
    branches: [main]
    paths:
      - 'workers/rpc-gateway/**'
      - '.github/workflows/deploy-gateway.yml'
  workflow_dispatch:

jobs:
  deploy-gateway:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy gateway Worker
        run: |
          if [ -z "${CLOUDFLARE_API_TOKEN}" ] || [ -z "${CLOUDFLARE_ACCOUNT_ID}" ]; then
            echo "::error::Missing CLOUDFLARE_API_TOKEN or CLOUDFLARE_ACCOUNT_ID. Add the same secrets used for Pages deploy."
            exit 1
          fi
          pnpm exec wrangler deploy --config workers/rpc-gateway/wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
